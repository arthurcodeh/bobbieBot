<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Meccanoid Control Panel</title>

    <style>
        body {
            background-color: #1e1e2f;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #ffd700;
            margin-bottom: 30px;
        }

        h2 {
            margin-top: 30px;
            color: #9cdcfe;
        }

        .section {
            background-color: #2d2d44;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 6px 10px rgba(0,0,0,0.3);
        }

        .buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            background-color: #3a3a5c;
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #505080;
            transform: scale(1.05);
        }

        input[type="range"] {
            width: 100%;
        }

        .slider-group {
            margin-top: 15px;
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #7fff7f;
        }
    </style>
</head>

<body>

<h1>🤖 Meccanoid – Control Panel</h1>

<!-- TÊTE
     Protocole : "head <servoIndex> <angle>"
     Servo 0 → rotation horizontale [10°, 170°]
     Servo 1 → inclinaison verticale [45°, 135°]
-->
<div class="section">
    <h2>Tête</h2>

    <div class="buttons">
        <button onclick="sendCmd('head 0 60')">← Gauche</button>
        <button onclick="sendCmd('head 0 120')">→ Droite</button>
        <button onclick="sendCmd('head 1 60')">↑ Haut</button>
        <button onclick="sendCmd('head 1 120')">↓ Bas</button>
        <button onclick="sendCmd('head 0 90'); sendCmd('head 1 90')">⦿ Centre</button>
    </div>

    <div class="slider-group">
        <label>Rotation (servo 0) — horizontal</label>
        <input type="range" min="10" max="170" value="90"
               oninput="sendCmd('head 0 ' + this.value)">
    </div>

    <div class="slider-group">
        <label>Inclinaison (servo 1) — vertical</label>
        <input type="range" min="45" max="135" value="90"
               oninput="sendCmd('head 1 ' + this.value)">
    </div>
</div>

<!-- BRAS GAUCHE
     Protocole : "left <servoIndex> <angle>"
     Servo 0 → épaule [10°, 170°]
     Servo 1 → coude  [10°, 180°]
     Servo 2 → pince  [0°,  90°]
-->
<div class="section">
    <h2>Bras gauche</h2>

    <div class="buttons">
        <button onclick="sendCmd('left 0 150')">Lever</button>
        <button onclick="sendCmd('left 0 30')">Baisser</button>
        <button onclick="sendCmd('left 2 0')">Ouvrir</button>
        <button onclick="sendCmd('left 2 90')">Fermer</button>
    </div>
</div>

<!-- BRAS DROIT
     Protocole : "right <servoIndex> <angle>"
     Servo 0 → épaule [10°, 170°]
     Servo 1 → coude  [10°, 180°]
     Servo 2 → pince  [90°, 180°] (symétrique du gauche)
-->
<div class="section">
    <h2>Bras droit</h2>

    <div class="buttons">
        <button onclick="sendCmd('right 0 150')">Lever</button>
        <button onclick="sendCmd('right 0 30')">Baisser</button>
        <button onclick="sendCmd('right 2 180')">Ouvrir</button>
        <button onclick="sendCmd('right 2 90')">Fermer</button>
    </div>
</div>

<!-- ACTIONS GLOBALES
     Remet tous les membres en position neutre (90°).
-->
<div class="section">
    <h2>Actions globales</h2>

    <div class="buttons">
        <button onclick="resetAll()">Position neutre</button>
    </div>
</div>

<!-- YEUX
     Protocole : "eyes <action>"
     Actions disponibles : off, white, red, green, blue
-->
<div class="section">
    <h2>Yeux</h2>

    <div class="buttons">
        <button onclick="sendCmd('eyes off')">Éteints</button>
        <button onclick="sendCmd('eyes white')">Blanc</button>
        <button onclick="sendCmd('eyes red')">Rouge</button>
        <button onclick="sendCmd('eyes green')">Vert</button>
        <button onclick="sendCmd('eyes blue')">Bleu</button>
    </div>
</div>


<div class="status" id="status">
    Statut : prêt
</div>

<script>
    /**
     * Envoie une commande au firmware ESP32 via la route /cmd?value=...
     * Le firmware transmet ensuite la valeur à l'Arduino via Serial.
     *
     * @param {string} value - Commande texte (ex: "head 0 90", "eyes red")
     */
    function sendCmd(value) {
        fetch('/cmd?value=' + encodeURIComponent(value))
            .then(() => updateStatus("Commande envoyée : " + value))
            .catch(() => updateStatus("Erreur : ESP32 injoignable"));
    }

    /**
     * Remet tous les membres en position neutre.
     * Envoie une commande par servo pour garantir l'ordre d'exécution.
     */
    function resetAll() {
        ['head 0 90', 'head 1 90',
            'left 0 90', 'left 1 90', 'left 2 45',
            'right 0 90', 'right 1 90', 'right 2 135'
        ].forEach(cmd => sendCmd(cmd));
    }

    /**
     * Met à jour la barre de statut visible en bas de page.
     * @param {string} text - Message à afficher.
     */
    function updateStatus(text) {
        document.getElementById('status').innerText = 'Statut : ' + text;
    }
</script>

</body>
</html>
